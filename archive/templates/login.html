<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Control de gastos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="login-title">Iniciar sesión</h1>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST" autocomplete="off" class="login-form">
                <input
                    type="email"
                    name="email"
                    placeholder="correo electrónico"
                    autocomplete="off"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="contraseña"
                    autocomplete="new-password"
                    required
                >

                <button type="submit" class="btn-main">Entrar</button>
            </form>

            <a href="/register" class="btn-secondary">crear cuenta</a>
        </div>
    </div>

</body>
</html>
