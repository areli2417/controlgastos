{% extends "base.html" %}

{% block title %}Editar Ingreso - FinanzasPro{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-12">
    <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-xl">
        <div class="flex items-center space-x-4 mb-8">
            <a href="{{ url_for('dashboard.dashboard_view', seccion='ingresos') }}" class="p-2 hover:bg-slate-50 rounded-xl transition-colors text-slate-400">
                <i data-lucide="arrow-left" class="h-5 w-5"></i>
            </a>
            <h2 class="text-2xl font-bold text-slate-900">Editar Ingreso</h2>
        </div>

        <form action="{{ url_for('transactions.editar_ingreso', id=ingreso.id) }}" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                 <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Monto</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">$</span>
                        <input type="number" step="0.01" name="monto" value="{{ ingreso.monto }}" required
                               class="w-full pl-8 pr-4 py-2 border border-slate-300 rounded-xl focus:ring-primary-500 focus:border-primary-500 transition-all shadow-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Periodo</label>
                    <select name="tipo_periodo" required class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-primary-500 focus:border-primary-500 transition-all shadow-sm">
                        <option value="semanal" {% if ingreso.tipo_periodo == 'semanal' %}selected{% endif %}>Semanal</option>
                        <option value="quincenal" {% if ingreso.tipo_periodo == 'quincenal' %}selected{% endif %}>Quincenal</option>
                        <option value="mensual" {% if ingreso.tipo_periodo == 'mensual' %}selected{% endif %}>Mensual</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Fecha</label>
                <input type="date" name="fecha" value="{{ ingreso.fecha }}" required
                       class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-primary-500 focus:border-primary-500 transition-all shadow-sm">
            </div>

            <div class="pt-4 flex space-x-4">
                <button type="submit" class="flex-1 bg-primary-600 text-white py-3 px-6 rounded-xl font-bold hover:bg-primary-700 transition-all transform hover:scale-[1.01]">
                    Actualizar Información
                </button>
                <a href="{{ url_for('dashboard.dashboard_view', seccion='ingresos') }}" class="px-6 py-3 border border-slate-200 rounded-xl text-slate-600 font-medium hover:bg-slate-50 transition-all">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
